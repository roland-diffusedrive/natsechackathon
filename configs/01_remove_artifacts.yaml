# Stage 01: remove flags, watermarks, and emblems from raw scraped tank images.
openai_api_key_env: OPENAI_API_KEY
model_name: gpt-image-2

input_image: data/raw/images
prompt_file: prompts/01_remove_artifacts_prompt.txt
output_dir: data/cleaned/images
use_prompt_as_filename: false

size: original        # null | "auto" | "original" | "WIDTHxHEIGHT"
quality: high         # low | medium | high | auto
output_format: jpeg   # png | jpeg | webp
output_compression: null
background: auto
n: 1
max_concurrent_requests: 15
